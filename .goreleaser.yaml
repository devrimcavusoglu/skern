version: 2

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - main: ./cmd/scribe
    binary: scribe
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/devrimcavusoglu/scribe/internal/cli.Version={{.Version}}
      - -X github.com/devrimcavusoglu/scribe/internal/cli.Commit={{.Commit}}
      - -X github.com/devrimcavusoglu/scribe/internal/cli.Date={{.Date}}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

brews:
  - repository:
      owner: devrimcavusoglu
      name: homebrew-tap
    homepage: "https://github.com/devrimcavusoglu/scribe"
    description: "Agent-first CLI for managing Agent Skills across agentic platforms"
    license: "Apache-2.0"
    install: |
      bin.install "scribe"
    test: |
      system "#{bin}/scribe", "version"

release:
  github:
    owner: devrimcavusoglu
    name: scribe
