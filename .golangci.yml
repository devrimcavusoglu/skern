version: "2"

linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - misspell
    - revive
  settings:
    revive:
      rules:
        - name: exported
          arguments:
            - "checkPrivateReceivers"
  exclusions:
    presets: []

formatters:
  enable:
    - gofmt
